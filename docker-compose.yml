services:
  backend:
    build:
      context: ./backend
    container_name: aurex-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    expose:
      - "4000"
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: aurex-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
