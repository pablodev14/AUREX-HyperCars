<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 430" role="img" aria-labelledby="title desc">
  <title id="title">AUREX HyperCars README banner</title>
  <desc id="desc">Banner animado de la marca AUREX HyperCars con auto deportivo y lineas de energia.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050607"/>
      <stop offset=".52" stop-color="#101516"/>
      <stop offset="1" stop-color="#2c160b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#9d5a2c"/>
      <stop offset=".5" stop-color="#f1b96d"/>
      <stop offset="1" stop-color="#fff0b8"/>
    </linearGradient>
    <linearGradient id="car" x1="120" y1="260" x2="1190" y2="260">
      <stop offset="0" stop-color="#070909"/>
      <stop offset=".26" stop-color="#652816"/>
      <stop offset=".52" stop-color="#e99245"/>
      <stop offset=".68" stop-color="#ffd18a"/>
      <stop offset=".86" stop-color="#4d1b13"/>
      <stop offset="1" stop-color="#070909"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#000" flood-opacity=".7"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1400" height="430" rx="18" fill="url(#bg)"/>
  <path d="M0 324 C240 260 456 252 704 274 C990 299 1178 280 1400 225 L1400 430 L0 430Z" fill="#070909"/>
  <g opacity=".28">
    <path d="M980 0v430M1120 0v430M1260 0v430" stroke="#fff" stroke-opacity=".16"/>
    <path d="M0 110h1400M0 210h1400M0 310h1400" stroke="#fff" stroke-opacity=".1"/>
  </g>
  <path d="M140 344 C420 306 760 307 1180 346" stroke="#4fd4c8" stroke-width="6" stroke-linecap="round" opacity=".5" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values=".2;.75;.2" dur="2.8s" repeatCount="indefinite"/>
  </path>
  <path d="M216 374 C500 336 828 337 1148 374" stroke="#d6914b" stroke-width="4" stroke-linecap="round" opacity=".42">
    <animate attributeName="stroke-dasharray" values="20 40;80 20;20 40" dur="3.2s" repeatCount="indefinite"/>
  </path>
  <g filter="url(#shadow)" transform="translate(45 28)">
    <ellipse cx="686" cy="310" rx="450" ry="52" fill="#000" opacity=".48"/>
    <path d="M110 292c62-75 157-115 285-126 64-81 155-121 274-120 126 1 226 45 302 132 66 8 120 28 160 57 25 18 21 52-8 66-78 36-206 54-384 54H320c-106 0-176-21-211-62-4-5-4-6 1-1Z" fill="url(#car)"/>
    <path d="M404 166c60-65 140-97 239-96 97 1 177 35 238 101-84 5-165 7-244 6-80-1-158-5-233-11Z" fill="#4fd4c8" opacity=".72"/>
    <path d="M151 290c104 23 230 34 376 34h300c130 0 229-15 298-45-42 49-170 73-385 73H318c-88 0-144-21-167-62Z" fill="#050708"/>
    <path d="M820 200c110 12 198 36 264 72-63 9-153 2-272-21Z" fill="#fff0b8" opacity=".82"/>
    <path d="M178 281c76-58 165-89 266-94l-54 88c-91 14-162 16-212 6Z" fill="#4fd4c8" opacity=".76"/>
    <circle cx="350" cy="348" r="73" fill="#050607"/>
    <circle cx="350" cy="348" r="44" fill="#111719" stroke="#d6914b" stroke-width="8"/>
    <circle cx="350" cy="348" r="12" fill="#fff6d4"/>
    <circle cx="850" cy="348" r="73" fill="#050607"/>
    <circle cx="850" cy="348" r="44" fill="#111719" stroke="#d6914b" stroke-width="8"/>
    <circle cx="850" cy="348" r="12" fill="#fff6d4"/>
  </g>
  <text x="72" y="92" fill="url(#gold)" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="900" letter-spacing="3">AUREX</text>
  <text x="76" y="132" fill="#fffaf0" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">HyperCars · Frontend + Backend + Docker + AWS Terraform</text>
  <text x="76" y="168" fill="#b9b1a4" font-family="Segoe UI, Arial, sans-serif" font-size="18">Servicio telematico desplegable automaticamente en nube</text>
  <circle cx="58" cy="72" r="8" fill="#4fd4c8">
    <animate attributeName="r" values="6;12;6" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".5;1;.5" dur="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>
